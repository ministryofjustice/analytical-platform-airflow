      env_vars:
        AFFILE_PIPELINE_NAME: "customer_headers"
    load-sba_mo_locations:
      env_vars:
        AFFILE_PIPELINE_NAME: "sba_mo_locations"
    load-po_lines:
      env_vars:
        AFFILE_PIPELINE_NAME: "po_lines"
    load-po_headers:
      env_vars:
        AFFILE_PIPELINE_NAME: "po_headers"
    load-supplier_bank_accounts:
      env_vars:
        AFFILE_PIPELINE_NAME: "supplier_bank_accounts"
    load-aged_debt_analysis:
      env_vars:
        AFFILE_PIPELINE_NAME: "aged_debt_analysis"
    load-ap_03_invoices_hold:
      env_vars:
        AFFILE_PIPELINE_NAME: "ap_03_invoices_hold"
    load-ap_invoice_holds:
      env_vars:
        AFFILE_PIPELINE_NAME: "ap_invoice_holds"
    load-invoice_headers_open:
      env_vars:
        AFFILE_PIPELINE_NAME: "invoice_headers_open"
    load-invoice_lines_open:
      env_vars:
        AFFILE_PIPELINE_NAME: "invoice_lines_open"
    load-ar_payment_schedules_closed:
      env_vars:
        AFFILE_PIPELINE_NAME: "ar_payment_schedules_closed"
    load-ar_transaction_headers_closed:
      env_vars:
        AFFILE_PIPELINE_NAME: "ar_transaction_headers_closed"
    load-ar_transaction_lines_closed:
      env_vars:
        AFFILE_PIPELINE_NAME: "ar_transaction_lines_closed"
    load-ar_payment_schedules_open:
      env_vars:
        AFFILE_PIPELINE_NAME: "ar_payment_schedules_open"
    load-ar_transaction_headers_open:
      env_vars:
