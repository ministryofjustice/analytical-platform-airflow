---
dag:
  repository: ministryofjustice/analytical-platform-airflow-cadet-deployer
  tag: 1.3.8
  schedule: "0 3 * * 1-6"
  catchup: false
  env_vars:
    DEPLOY_ENV: prod
    DBT_PROFILE_WORKGROUP: dbt-daily
    DBT_PROJECT: mojap_derived_tables
    WORKFLOW_NAME: deploy-daily
    DBT_SELECT_CRITERIA: tag:daily
    BRANCH: main
    MODE: build
  tasks:
    table_deploy:
      compute_profile: general-on-demand-32vcpu-128gb
    check_run_results:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
        IS_DATASET_CHECK: true
      dependencies: [table_deploy]
      outlets:
        - "s3://mojap-derived-tables/prod/daily/"

maintainers:
  - jhpyke

secrets:
  - github-key

iam:
  athena: write
  glue: true
  lake_formation: true
  s3_read_write:
    - mojap-derived-tables/prod/*

tags:
  business_unit: Central Digital
  owner: analytical-platform@justice.gov.uk
