---
dag:
  repository: moj-analytical-services/airflow-laa-data-extractor
  tag: v0.3.3
  retries: 2
  retry_delay: 300
  env_vars:
    ORACLE_DSN: "rds.laa-finance-data.service.justice.gov.uk:1521/mojfin"
    ATHENA_LANDING_FOLDER: "s3://mojap-land-dev/laa/mojfin/stats/curated"
    BUCKET: "alpha-mojap-laa"
    SERVICE: "athena"
    ORACLE_USER: "LAASTATS_ARC"
    DATABASE_NAME: "laa_datashare"
    TABLE_PREFIX: "ZFOI_"

iam:
  athena: write
  glue: true
  s3_read_write:
    - mojap-land-dev/laa/mojfin/stats/*

secrets:
  - username
  - password

notifications:
  emails:
    - Damilola.Oyebade@justice.gov.uk
  slack_channel: laa-de-alerts

maintainers:
  - dami-moj

tags:
  business_unit: LAA
  owner: Damilola.Oyebade@justice.gov.uk
