dag:
  repository: moj-analytical-services/airflow-sdp-extraction
  tag: v3.0.13
  retries: 1
  retry_delay: 150
  hmcts_sdp_networking: True
  max_active_runs: 3
  env_vars:
    TASK: "extract"
    LOG_LEVEL: "DEBUG"
    ENDPOINT: "MI_PERSISTENT_PROD"
    SDP_TABLE_PREFIX: "v3-cgi-vde-xhibit-xhb"
    PRESERVE_SDP_FOLDER_STRUCT: "replace_prefix"
    COPY_MODE: "new"
    CHECK_MODE: "hist"
    FILENAME_COL_NAME: "mojap_unpacked_filename"
    EXCLUDED_FILES_REGEXPR: "_metadata.json$"
    DATABASE_NAME: "xhibit_preprocessed_dev"
    LAND_BUCKET: "s3://mojap-land-dev"
    HIST_BUCKET: "s3://mojap-raw-hist-dev"
    LAND_FOLDER: "hmcts/xhibit/"
    HIST_FOLDER: "hmcts/xhibit/"
    CUT_OFF: "2024-06-01"
  tasks:
    xhibit_extract_migrate_case:
      env_vars:
        TABLE_NAME: "migrate-case"
        S3_TABLE_NAME: "migrate_case"
        FILENAME_TABLE_NAME: "migrate_case"

iam:
  athena: write
  s3_read_write:
    - mojap-land-dev/hmcts/xhibit/*
  s3_read_only:
    - alpha-mojap-curated-xhibit/ors/v2_dev/*
    - alpha-mojap-ccd/*

secrets:
  - sdp-pass

maintainers:
  - Andy-Cook
  - jovita-brundziene

tags:
  business_unit: Central Digital
  owner: andrew.cook1@justice.gov.uk
