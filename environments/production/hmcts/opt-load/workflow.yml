dag:
  repository: moj-analytical-services/airflow-create-a-pipeline
  tag: v4.0.21
  retries: 1
  retry_delay: 150
  start_date: "2026-04-30"
  max_active_runs: 5
  env_vars:
    LOG_LEVEL: "INFO"
    LAND: "s3://mojap-land/hmcts/opt"
    RAW_HIST: "s3://mojap-raw-hist/hmcts/opt"
    BASE_LOC: "s3://alpha-mojap-curated-opt/prod/v1/"
    BASE_DB_NAME: "opt_preprocessed"
    SERVICE: "opt"
    CHUNK_SIZE: "1000000"
    DAG_INTERVAL_END: "{{ data_interval_end }}"
    PARTITION_COL: "extraction_date"

  tasks:
    opt-load-data-tbl-mags-cie-new:
      env_vars:
        TABLE: "data_tbl_mags_cie_new"

iam:
  athena: write
  glue: true
  s3_read_write:
    - mojap-land/hmcts/opt/*
    - mojap-raw-hist/hmcts/opt/*
    - alpha-mojap-curated-opt/prod/v1/*

maintainers:
  - jovita-brundziene
  - Andy-Cook

tags:
  business_unit: Central Digital
  owner: jovita.brundziene@justice.gov.uk
