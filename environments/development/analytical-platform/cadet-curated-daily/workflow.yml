---
dag:
  repository: ministryofjustice/analytical-platform-airflow-cadet-deployer
  tag: 1.2.6
  compute_profile: general-on-demand-16vcpu-64gb
  schedule: "0 6 * * *"
  catchup: false
  outlets:
    - "s3://mojap-derived-tables/dev/oasys-question-curated-daily/"
  env_vars:
    DEPLOY_ENV: sandpit
    DBT_PROFILE_WORKGROUP: dbt-oasys-question
    DBT_PROJECT: mojap_derived_tables
    WORKFLOW_NAME: deploy-oasys-question
    DBT_SELECT_CRITERIA: tag:oasys_question_only
    BRANCH: main
    MODE: build
  tasks:
    table_deploy:
      compute_profile: general-on-demand-8vcpu-32gb

maintainers:
  - AntonyJScott

secrets:
  - github-key

iam:
  athena: write
  glue: true
  s3_read_write:
    - mojap-derived-tables/dev/*

tags:
  business_unit: HQ
  owner: antony.scott@justice.gov.uk
