dag:
  repository: moj-analytical-services/airflow-curious-2-pipeline

  tag: v1.1.1

  schedule: "0 5 * * *"
  catchup: false

  env_vars:
    "ENV": "preprod"
    "S3_LANDING_BUCKET": "mojap-land-preprod"
    "S3_LANDING_KEY_PREFIX": "hmpps/prison-curious2"
    "S3_RAW_HIST_BUCKET": "mojap-raw-hist-preprod"
    "S3_RAW_HIST_KEY_PREFIX": "hmpps/prison-curious2/raw-history"
    "S3_FAILED_BUCKET": "mojap-land-fail-preprod"
    "S3_FAILED_KEY_PREFIX": "hmpps/prison-curious2"
    "S3_SECRETS_BUCKET": "mojap-land-preprod"
    "S3_SECRETS_KEY": "hmpps/prison-curious2/sas_token_info.txt"
    SECRET_NAME: >
            /airflow/sandbox/prison-curious/test/curious-azure-credential
    "SECRET_NAME_REGION": "eu-west-2"

  tasks:
    get_secret:
      env_vars:
        STEP: "get_secret"
      compute_profile: "general-on-demand-1vcpu-4gb"
    extract_and_upload:
      env_vars:
        STEP: "extract_and_upload"
      compute_profile: "general-on-demand-1vcpu-4gb"
      dependencies: [get_secret]
    validate_raw_data:
      env_vars:
        STEP: "validate_raw_data"
      compute_profile: "general-on-demand-1vcpu-4gb"
      dependencies: [extract_and_upload]

iam:
  athena: write
  glue: true
  s3_read_write:
    - mojap-land-preprod/hmpps/prison-curious2/*
    - mojap-raw-hist-preprod/hmpps/prison-curious2/*
    - mojap-land-fail-preprod/hmpps/prison-curious2/*

secrets:
  - curious-azure-credential

maintainers:
  - iainborsbey-mj
  - AnthonyCody
  - andrewc-moj

tags:
  business_unit: HQ
  owner: iain.borsbey@justice.gov.uk

notifications:
  emails:
    - andrew.craik@justice.gov.uk
    - iain.borsbey@justice.gov.uk
    - anthony.cody@justice.gov.uk
