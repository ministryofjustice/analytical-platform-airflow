dag:
  repository: moj-analytical-services/data_linking
  tag: v4.0.0.dev7
  retries: 4
  retry_delay: 60
  max_active_runs: 1
  catchup: false
  depends_on_past: false
  start_date: "2024-05-19"
  schedule: "0 20 * * 7"
  env_vars:
    SNAPSHOT_DATE: "{{ (data_interval_end - macros.timedelta(hours=20)).strftime('%Y-%m-%d') }}"
    GLUE_ROLE: airflow_prod_data_linking
    VERSION: prod

  tasks:
    config:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
        JOB_PATH: 07_other_glue_jobs/get_closest_snapshot_dates

    update-s3-logs:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
        JOB_PATH: 07_other_glue_jobs/update_s3_logs

    product-monitoring:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
        JOB_PATH: 07_other_glue_jobs/product_monitoring
      dependencies: [prod-int-cjs]

    mh-src-n:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
        JOB_PATH: 01_node_generation/source_nodes/person/mags_hocas
      dependencies: [config]

    mh-std-n:
      compute_profile: general-spot-8vcpu-32gb
      env_vars:
        JOB_PATH: 01_node_generation/standardised_nodes/person/mags_hocas
      dependencies: [mh-src-n]

    mh-e:
      compute_profile: general-spot-16vcpu-64gb
      env_vars:
        JOB_PATH: 03_edge_generation/person/mags_hocas
      dependencies: [mh-std-n]

    cx-src-n:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
        JOB_PATH: 01_node_generation/source_nodes/person/crown_xhibit
      dependencies: [config]

    cx-std-n:
      compute_profile: general-spot-8vcpu-32gb
      env_vars:
        JOB_PATH: 01_node_generation/standardised_nodes/person/crown_xhibit
      dependencies: [cx-src-n]

    cx-e:
      compute_profile: general-spot-16vcpu-64gb
      env_vars:
        JOB_PATH: 03_edge_generation/person/crown_xhibit
      dependencies: [cx-std-n]

    cp-src-n:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
        JOB_PATH: 01_node_generation/source_nodes/person/common_platform
      dependencies: [config]

    cp-std-n:
      compute_profile: general-spot-8vcpu-32gb
      env_vars:
        JOB_PATH: 01_node_generation/standardised_nodes/person/common_platform
      dependencies: [cp-src-n]

    cp-e:
      compute_profile: general-spot-16vcpu-64gb
      env_vars:
        JOB_PATH: 03_edge_generation/person/common_platform
      dependencies: [cp-std-n]

    pn-src-n:
      compute_profile: general-spot-1vcpu-4gb
      env_vars:
