---
dag:
  repository: ministryofjustice/replicate-athena-to-fabric
  tag: v1.0
  catchup: false
  compute_profile: general-on-demand-2vcpu-8gb
  max_active_runs: 1
  retries: 1
  env_vars:
    AWS_DEFAULT_REGION: "eu-west-1"
    AWS_ATHENA_QUERY_EXTRACT_REGION: "eu-west-1"
    DATABASE: "athena_query_executions"
  tasks:
    central_dims:
      env_vars:
        TABLES: "central"
    cica_tables:
      env_vars:
        TABLES: "cica"
    hmcts_tables:
      env_vars:
        TABLES: "hmcts"
    hmpps_tables:
      env_vars:
        TABLES: "hmpps"
    laa_tables:
      env_vars:
        TABLES: "laa"
    moj_digital_tables:
      env_vars:
        TABLES: "moj_digital"
    moj_hq_tables:
      env_vars:
        TABLES: "moj_hq"
    opg_tables:
      env_vars:
        TABLES: "opg"
    stg_tables:
      env_vars:
        TABLES: "stg"

iam:
  athena: write
  glue: true
  s3_read_write:
    - alpha-corp-data-staging/athena_queries/*
    - mojap-athena-query-dump/*

secrets:
  - azure-client-id
  - azure-tenant-id
  - azure-client-secret
  - fabric-warehouse-endpoint

maintainers:
  - moj-supratikc
  - csheldon155

tags:
  business_unit: Central Digital
  owner: supratik.chowdhury@justice.gov.uk
