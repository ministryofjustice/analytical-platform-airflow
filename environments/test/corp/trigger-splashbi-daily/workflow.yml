---
dag:
  repository: moj-analytical-services/airflow-report-extractor
  tag: v1.6.7-test
  is_paused_upon_creation: true
  retries: 1
  retry_delay: 60
  compute_profile: general-on-demand-2vcpu-8gb
  env_vars:
    REPORT_APP: "splashbi"
    REPORT_RUNTIME_ENV: "test"
    REPORT_RUN_MODE: "trigger"
  tasks:
    # === Credential Validation ===
    validate-credentials:
      env_vars:
        REPORT_RUN_MODE: "check-credentials"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"

    # === HR Staff list ===
    moj-hr-wf-11-staff-list:
      env_vars:
        REPORT_NAME: "moj-hr-wf-11"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    cts-hr-wf-11-staff-list:
      env_vars:
        REPORT_NAME: "cts-hr-wf-11"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    nms-hr-wf-11-staff-list:
      env_vars:
        REPORT_NAME: "nms-hr-wf-11"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    opg-hr-wf-11-staff-list:
      env_vars:
        REPORT_NAME: "opg-hr-wf-11"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    laa-hr-wf-11-staff-list:
      env_vars:
        REPORT_NAME: "laa-hr-wf-11"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]

    # === Temporary Promotion Worksheet ===
    laa-hr-wf-02-tpw:
      env_vars:
        REPORT_NAME: "laa-hr-wf-02-tpw"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    cts-hr-wf-02-tpw:
      env_vars:
        REPORT_NAME: "cts-hr-wf-02-tpw"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    opg-hr-wf-02-tpw:
      env_vars:
        REPORT_NAME: "opg-hr-wf-02-tpw"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    nms-hr-wf-02-tpw:
      env_vars:
        REPORT_NAME: "nms-hr-wf-02-tpw"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]
    moj-hr-wf-02-tpw:
      env_vars:
        REPORT_NAME: "moj-hr-wf-02-tpw"
        REPORT_SECRET_ID: "sbi-user-mojsupratikc"
      dependencies: [validate-credentials]

