---
name: 🛂 Workflow Validation

on:
  pull_request:
    branches:
      - "main"
    paths:
      - environments/**

permissions: {}

jobs:
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      workflows: ${{ steps.detect_changes.outputs.changes }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build path-filters File
        id: build_path_filters
        run: bash scripts/path-filter/configuration-generator.sh workflows

      - name: Detect Changes
        id: detect_changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: .github/path-filter/workflows.yml

      - name: Check Changed Length
        id: check_changed_length
        env:
          CHANGES: ${{ steps.detect_changes.outputs.changes }}
        run: |
          if [[ "$(jq 'length > 1' <<< "${CHANGES}")" == "true" ]]; then
            echo "Multiple workflows changed, exiting..."
            exit 1
          fi

      - name: Comment on Length Check Failure
        id: comment_on_test_failure
        if: failure() && steps.check_changed_length.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Changes to multiple workflows detected. Please ensure only one workflow is changed at a time.'
            })

      - name: Upload path-filters File
        id: upload_path_filter
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workflows-path-filter
          path: .github/path-filter/workflows.yml

  workflow-validation:
    if: ${{ needs.detect-changes.outputs.workflows != '[]' }}
    needs: [detect-changes]
    name: 🏗️ Workflow Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        workflow: ${{ fromJson(needs.detect-changes.outputs.workflows) }}
    outputs:
      environment: ${{ steps.set_outputs.outputs.environment }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::509399598587:role/analytical-platform-github-actions

      - name: Set Up UV
        id: setup_uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          activate-environment: true
          version: "latest"
          python-version: "3.11"

      - name: Install Requirements
        id: install_requirements
        run: |
          uv pip install --requirements requirements.txt

      - name: Download path-filters File
        id: download_path_filters
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflows-path-filter
          path: .github/path-filter

      - name: Set Workflow Directory
        id: set_workflow_directory
        env:
          WORKFLOW: ${{ matrix.workflow }}
        run: |
          workflowDirectory=$(yq -e ".${WORKFLOW}" .github/path-filter/workflows.yml | sed 's/.\{3\}$//')
          export workflowDirectory

          echo "workflow-directory=${workflowDirectory}" >>"${GITHUB_ENV}"

      - name: Check if Workflow Directory Includes Underscore
        id: check_workflow_directory_underscore
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          if [[ "${WORKFLOW_DIRECTORY}" == *"_"* ]]; then
            echo "Workflow directory contains underscores, which is not allowed."
            exit 1
          fi

      - name: Comment on Underscore Check Failure
        id: comment_on_underscore_failure
        if: failure() && steps.check_workflow_directory_underscore.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'The workflow directory name contains underscores. Please use hyphens instead of underscores.'
            })

      - name: Maintainer GitHub Username Validation
        id: github_user_validation
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          bash "scripts/github/user-validation.sh" "${WORKFLOW_DIRECTORY}/workflow.yml"

      - name: Check Computed IAM Role Name Length
        id: check_iam_role_length
        env:
          IAM_ROLE_NAME_PREFIX: "airflow"
          IAM_ROLE_NAME_MAX_LENGTH: 64
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          externalIamRole=$(yq --output-format=json "${WORKFLOW_DIRECTORY}/workflow.yml" | jq -r '.iam.external_role')
          export externalIamRole

          if [[ "${externalIamRole}" == "null" ]]; then
            echo "No external IAM role defined in workflow.yml"

            getEnvironment=$(echo "${WORKFLOW_DIRECTORY}" | cut -d'/' -f2)
            export getEnvironment

            getProject=$(echo "${WORKFLOW_DIRECTORY}" | cut -d'/' -f3)
            export getProject

            getWorkflow=$(echo "${WORKFLOW_DIRECTORY}" | cut -d'/' -f4)
            export getWorkflow

            computedRoleName="${IAM_ROLE_NAME_PREFIX}-${getEnvironment}-${getProject}-${getWorkflow}"
            export computedRoleName

            if [[ "${#computedRoleName}" -gt "${IAM_ROLE_NAME_MAX_LENGTH}" ]]; then
              echo "Computed IAM role name (${computedRoleName}) exceeds (${#computedRoleName}) maximum length of ${IAM_ROLE_NAME_MAX_LENGTH} characters."
              exit 1
            fi
          else
            echo "External IAM role defined in workflow.yml, skipping computed IAM role name length check"
          fi

      - name: Comment on IAM Role Length Check Failure
        id: comment_on_iam_role_length_failure
        if: failure() && steps.check_iam_role_length.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'The computed IAM role name exceeds the maximum length. Please shorten the project or workflow name to ensure the IAM role name is within the allowed limit of ${process.env['IAM_ROLE_NAME_MAX_LENGTH']} characters.'
            })

      - name: Check if DAG is Python
        id: dag_is_python
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          set -x

          dagIsPython=$(yq ".dag.python_dag // false" "${WORKFLOW_DIRECTORY}/workflow.yml")
          export dagIsPython

          if [[ "${dagIsPython}" == "true" ]]; then
            echo "dag-is-python=true"  >>"${GITHUB_ENV}"
          else
            echo "dag-is-python=false"  >>"${GITHUB_ENV}"
          fi

      - name: Validate Schema
        id: validate_schema
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          python scripts/workflow_schema_validation/main.py "${WORKFLOW_DIRECTORY}/workflow.yml"

      - name: Generate Workflow
        id: generate_workflow
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          python scripts/workflow_generator/main.py "${WORKFLOW_DIRECTORY}/workflow.yml"

      - name: Validate Workflow
        id: validate_workflow
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
          DAG_IS_PYTHON: ${{ env.dag-is-python }}
          PYTHONPATH: airflow
        run: |
          workflowDirectory="${WORKFLOW_DIRECTORY}"
          distWorkflowDirectory=${workflowDirectory#environments/}

          # Replace electronic-monitoring-data-store with emds
          if [[ "${distWorkflowDirectory}" == *"electronic-monitoring-data-store"* ]]; then
            distWorkflowDirectory="${distWorkflowDirectory//electronic-monitoring-data-store/emds}"
          fi

          if [[ "${DAG_IS_PYTHON}" == "true" ]]; then
            python "dist/dags/${distWorkflowDirectory}/dag.py"
          else
            python scripts/workflow_validation/main.py "dist/dags/${distWorkflowDirectory}/workflow.yml"
          fi

      - name: Set Outputs
        id: set_outputs
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          # Environment
          getEnvironment=$(echo "${WORKFLOW_DIRECTORY}" | cut -d'/' -f2)
          export getEnvironment
          echo "environment=[\"${getEnvironment}\"]" >>"${GITHUB_OUTPUT}"

  terraform:
    needs: [workflow-validation]
    name: 🌐 Terraform
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/reusable-terraform.yml
    with:
      environments: ${{ needs.workflow-validation.outputs.environment }}

  image-check:
    if: ${{ needs.detect-changes.outputs.workflows != '[]' }}
    needs: [detect-changes, workflow-validation]
    name: 📦 Image Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        workflow: ${{ fromJson(needs.detect-changes.outputs.workflows) }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Up Container Structure Test
        id: setup_container_structure_test
        uses: ministryofjustice/action-setup-container-structure-test@d0636fa19d04c3fc71c30ae4eb8da03be63dbd4b # v1.0.0

      - name: Download path-filters File
        id: download_path_filters
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflows-path-filter
          path: .github/path-filter

      - name: Configure AWS Credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::509399598587:role/ecr-access

      - name: Log in to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: Set Workflow Directory
        id: set_workflow_directory
        env:
          WORKFLOW: ${{ matrix.workflow }}
        run: |
          workflowDirectory=$(yq -e ".${WORKFLOW}" .github/path-filter/workflows.yml | sed 's/.\{3\}$//')
          export workflowDirectory

          echo "workflow-directory=${workflowDirectory}" >>"${GITHUB_ENV}"

      - name: Set ECR Repository
        id: set_ecr_repository
        env:
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          dagRepository=$(yq -e ".dag.repository" "${WORKFLOW_DIRECTORY}/workflow.yml")
          export dagRepository

          ecrRepository=$(echo "${dagRepository}" | tr '[:upper:]' '[:lower:]' | sed 's/_/-/g')
          export ecrRepository

          dagTag=$(yq -e ".dag.tag" "${WORKFLOW_DIRECTORY}/workflow.yml")
          export dagTag

          echo "ecr-repository=${ecrRepository}" >>"${GITHUB_ENV}"
          echo "image-tag=${dagTag}" >>"${GITHUB_ENV}"

      - name: Check Image Exists
        id: check_image_exists
        env:
          ECR_REPOSITORY: ${{ env.ecr-repository }}
          IMAGE_TAG: ${{ env.image-tag }}
        run: |
          aws ecr describe-images --repository-name "${ECR_REPOSITORY}" --image-ids imageTag="${IMAGE_TAG}" || exit 1

      - name: Comment on Image Check Failure
        id: comment_on_check_failure
        if: failure() && steps.check_image_exists.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Specified image does not exist in the container registry. Please check the supplied image tag is correct, and it has been pushed successfully. Refer to the [User Guidance](https://user-guidance.analytical-platform.service.justice.gov.uk/services/airflow/index.html#create-a-github-release) for more information.'
            })

      - name: Pull Image and Check Size
        id: pull_image_and_check_size
        shell: bash
        env:
          IMAGE: 509399598587.dkr.ecr.eu-west-2.amazonaws.com/${{ env.ecr-repository }}:${{ env.image-tag }}
          THRESHOLD_GB: 4
        run: |
          docker pull "${IMAGE}"

          imageSize=$(docker inspect "${IMAGE}" --format='{{.Size}}')
          export imageSize

          imageSizeGB=$((imageSize / 1024 / 1024 / 1024))
          imageSizeMB=$((imageSize / 1024 / 1024))

          echo "Image size in bytes: ${imageSize}"
          echo "Image size in MB: ${imageSizeMB}"
          echo "Image size in GB: ${imageSizeGB}"

          if [[ "${imageSizeGB}" -gt "${THRESHOLD_GB}" ]]; then
            echo "Image size (${imageSizeGB} GB) exceeds threshold (${THRESHOLD_GB} GB)"
            echo "clean-runner=true" >>"${GITHUB_ENV}"
          else
            echo "Image size (${imageSizeGB} GB) is within threshold (${THRESHOLD_GB} GB)"
            echo "clean-runner=false" >>"${GITHUB_ENV}"
          fi

      - name: Clean Actions Runner
        id: clean_actions_runner
        if: env.clean-runner == 'true'
        uses: ministryofjustice/action-clean-runner@390530713a326ddc099b2114f38dd0f2f8eac6da # v1.1.0
        with:
          confirm: true

      - name: Fetch Container Structure Test
        id: fetch_container_structure_test
        run: |
          curl --silent --show-error --location https://raw.githubusercontent.com/ministryofjustice/analytical-platform-airflow-github-actions/refs/heads/main/assets/container-structure-test/container-structure-test.yml --output container-structure-test.yml

      - name: Container Structure Test
        id: container_structure_test
        shell: bash
        env:
          ECR_REPOSITORY: ${{ env.ecr-repository }}
          IMAGE_TAG: ${{ env.image-tag }}
        run: |
          container-structure-test test --config container-structure-test.yml --image "509399598587.dkr.ecr.eu-west-2.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"

      - name: Comment on Image Test Failure
        id: comment_on_test_failure
        if: failure() && steps.container_structure_test.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Container test has failed. Refer to the [User Guidance](https://user-guidance.analytical-platform.service.justice.gov.uk/services/airflow/index.html#configuration-testing) for more information.'
            })

      - name: Generate .grype.yml
        id: generate_grype_yml
        env:
          GH_TOKEN: ${{ secrets.DATA_PLATFORM_ROBOT_TOKEN }}
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          dagRepository=$(yq -e ".dag.repository" "${WORKFLOW_DIRECTORY}/workflow.yml")
          export dagRepository

          dagTag=$(yq -e ".dag.tag" "${WORKFLOW_DIRECTORY}/workflow.yml")
          export dagTag

          downloadDockerfile=$(gh api "repos/${dagRepository}/contents/Dockerfile?ref=${dagTag}" 2>/dev/null || true)
          export downloadDockerfile

          downloadDockerfileStatus=$(jq -r '.status' <<< "${downloadDockerfile}")
          export downloadDockerfileStatus

          if [[ "${downloadDockerfileStatus}" == "null" ]]; then
            jq -r '.content' <<< "${downloadDockerfile}" | base64 --decode > Dockerfile
          elif [[ "${downloadDockerfileStatus}" == "404" ]]; then
            echo "Dockerfile not found"
            exit 1
          else
            echo "Error downloading Dockerfile"
            exit 1
          fi

          downloadGrypeYml=$(gh api "repos/${dagRepository}/contents/.grype.yml?ref=${dagTag}" 2>/dev/null || true)
          export downloadGrypeYml

          downloadGrypeYmlStatus=$(jq -r '.status' <<< "${downloadGrypeYml}")
          export downloadGrypeYmlStatus

          if [[ "${downloadGrypeYmlStatus}" == "null" ]]; then
            jq -r '.content' <<< "${downloadGrypeYml}" | base64 --decode > .grype.yml
          elif [[ "${downloadGrypeYmlStatus}" == "404" ]]; then
            echo ".grype.yml not found" # It's OK if we don't find one, it means the user might not have created one yet
          else
            echo "Error downloading .grype.yml"
            exit 1
          fi

          imageName=$(grep "^FROM" Dockerfile | cut -d' ' -f2 | cut -d':' -f1 | cut -d'@' -f1)
          export imageName

          imageVersion=$(grep "^FROM" Dockerfile | cut -d':' -f2 | cut -d'@' -f1)
          export imageVersion

          imageRepo=${imageName#ghcr.io/}
          echo "upstream-image-repo=${imageRepo}" >>"${GITHUB_ENV}"

          imageRepoLatestVersion=$(gh release list --repo "${imageRepo}" --exclude-drafts --exclude-pre-releases --json "isLatest,tagName" | jq -r '.[] | select(.isLatest == true) | .tagName')
          export imageRepoLatestVersion
          echo "upstream-image-version=${imageRepoLatestVersion}" >>"${GITHUB_ENV}"

          if [[ "${imageVersion}" != "${imageRepoLatestVersion}" ]]; then
            echo "Image version (${imageVersion}) does not match latest version of upstream (${imageRepoLatestVersion})"
            echo "image-version-match=false" >>"${GITHUB_ENV}"
          else
            echo "Image version (${imageVersion}) matches latest version of upstream (${imageRepoLatestVersion})"
            echo "image-version-match=true" >>"${GITHUB_ENV}"
          fi

          curl --silent --show-error --location "https://raw.githubusercontent.com/${imageRepo}/refs/heads/main/.grype.yml" --output "runtime-grype.yml"

          if [[ ! -f .grype.yml ]]; then
            mv "runtime-grype.yml" .grype.yml
          else
            cat "runtime-grype.yml" >> .grype.yml
          fi

      - name: Comment on Image Version Mismatch
        id: comment_on_image_version_mismatch
        if: env.image-version-match == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Provided image does not use the latest version (${process.env['upstream-image-version']}) of [${process.env['upstream-image-repo']}](https://github.com/${process.env['upstream-image-repo']}/releases/latest). Please ensure you are using the latest version of the base image in your Dockerfile.`
            })

      - name: Scan
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: 509399598587.dkr.ecr.eu-west-2.amazonaws.com/${{ env.ecr-repository }}:${{ env.image-tag }}
          severity-cutoff: high
          only-fixed: true
          fail-build: false
          output-format: sarif
          output-file: result.sarif

      - name: Upload SARIF
        id: upload_sarif
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: result.sarif

      - name: Process Scan Result
        id: process_scan_result
        shell: bash
        run: |
          print_findings() {
            local title=$1
            local findings=$2
            if [[ -n "${findings}" ]]; then
              echo "### ${title}"
              echo ""
              echo "${findings}"
              echo ""
            fi
          }

          SARIF=$(cat result.sarif)

          # The SARIF format stores rules (vulnerability definitions) separately from results (findings).
          # Build a RULE_SEVERITIES map of ruleId -> NVD CVSS base score, then count findings by score band.
          # The finding message text is rewritten to match the classified severity so the output is consistent.
          RULE_SEVERITIES=$(echo "${SARIF}" | jq -c '
            .runs[0].tool.driver.rules
            | map({key: .id, value: (.properties["security-severity"] // "0" | tonumber)})
            | from_entries
          ')

          CRITICAL_COUNT=$(echo "${SARIF}" | jq --argjson s "${RULE_SEVERITIES}" '
            [.runs[0].results[] | select($s[.ruleId] >= 9.0)] | length
          ')
          HIGH_COUNT=$(echo "${SARIF}" | jq --argjson s "${RULE_SEVERITIES}" '
            [.runs[0].results[] | select($s[.ruleId] >= 7.0 and $s[.ruleId] < 9.0)] | length
          ')
          TOTAL=$((CRITICAL_COUNT + HIGH_COUNT))

          SCAN_OUTPUT=$({
            echo "# Container Scan Summary"
            echo ""

            if [[ ${TOTAL} -eq 0 ]]; then
              echo "✅ No fixable high or critical vulnerabilities found."
            else
              echo "${CRITICAL_COUNT} critical, ${HIGH_COUNT} high."
              echo ""
              echo "## Detailed Findings"
              echo ""

              get_findings() {
                local min_score=$1
                local max_score=$2
                local severity=$3
                echo "${SARIF}" | jq -r --argjson s "${RULE_SEVERITIES}" \
                  --argjson min "${min_score}" --argjson max "${max_score}" \
                  --arg severity "${severity}" '
                  (.runs[0].tool.driver.rules
                    | map({
                        key: .id,
                        value: (
                          .help.text
                          | split("\n")
                          | map(select(startswith("Fix Version: ")))
                          | if length > 0 then .[0] | ltrimstr("Fix Version: ") | split(",") | first else "" end
                        )
                      })
                    | from_entries) as $fix_versions
                  | def advisory_line:
                      (try (.ruleId | capture("^(?<id>CVE-[0-9]+-[0-9]+|GHSA-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+)") | .id) // .ruleId) as $id
                      | (if ($id | startswith("CVE-")) then "https://nvd.nist.gov/vuln/detail/\($id)"
                        elif ($id | startswith("GHSA-")) then "https://github.com/advisories/\($id)"
                        else "" end) as $url
                      | (($fix_versions[.ruleId] // "") | if . != "" then " (fixed in \(.)" else "" end) as $fix
                      | (if (.message.text | test("^A [A-Za-z]+ vulnerability"))
                        then (.message.text | sub("^A [A-Za-z]+ vulnerability"; "A \($severity) vulnerability"))
                        else "A \($severity) vulnerability: \(.message.text)"
                        end) as $text
                      | if $url != "" then "- [\($id)](\($url)) - \($text)\($fix)"
                        else "- \(.ruleId) - \($text)\($fix)"
                        end;
                  .runs[0].results[]
                  | select($s[.ruleId] >= $min and $s[.ruleId] < $max)
                  | advisory_line
                '
              }

              CRITICAL_FINDINGS=$(get_findings 9.0 10.1 "critical")
              HIGH_FINDINGS=$(get_findings 7.0 9.0 "high")

              print_findings "Critical" "${CRITICAL_FINDINGS}"
              print_findings "High" "${HIGH_FINDINGS}"

              echo "## Source"
              echo ""
              echo "<table>"
              echo "<tr><td><strong>Actor</strong></td><td>@${GITHUB_ACTOR}</td></tr>"
              echo "<tr><td><strong>Commit</strong></td><td><a href=\"https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}\"><code>${GITHUB_SHA}</code></a></td></tr>"
              echo "<tr><td><strong>Workflow</strong></td><td><a href=\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\">View run</a></td></tr>"
              echo "</table>"
            fi
          })

          echo "${SCAN_OUTPUT}"
          echo "${SCAN_OUTPUT}" >>"${GITHUB_STEP_SUMMARY}"
          {
            echo "scan-summary<<EOF"
            echo "${SCAN_OUTPUT}"
            echo "EOF"
            echo "critical-count=${CRITICAL_COUNT}"
            echo "high-count=${HIGH_COUNT}"
          } >>"${GITHUB_OUTPUT}"

      - name: Comment on Pull Request
        id: comment_on_pull_request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SCAN_SUMMARY: ${{ steps.process_scan_result.outputs.scan-summary }}
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Container Scan Summary')
            })

            const output = `${process.env.SCAN_SUMMARY}`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }

      - name: Fail Build on Findings
        if: |
          always() &&
          (steps.process_scan_result.outputs.critical-count > 0 ||
          steps.process_scan_result.outputs.high-count > 0 ||
          steps.process_scan_result.outcome == 'failure')
        id: fail_build
        shell: bash
        env:
          CRITICAL_COUNT: ${{ steps.process_scan_result.outputs.critical-count }}
          HIGH_COUNT: ${{ steps.process_scan_result.outputs.high-count }}
        run: |
          echo "Build failed - found ${CRITICAL_COUNT} critical and ${HIGH_COUNT} high severity fixable vulnerabilities"
          exit 1

      - name: Comment on Scan Failure
        id: comment_on_scan_failure
        if: failure() && steps.scan.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Container scan has failed. Refer to the [User Guide](https://user-guidance.analytical-platform.service.justice.gov.uk/services/airflow/index.html#vulnerability-scanning) for more information.'
            })

  automatic-approval-gate:
    if: ${{ needs.detect-changes.outputs.workflows != '[]' }}
    needs: [detect-changes, workflow-validation, terraform, image-check]
    name: 🛂 Automatic Approval Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        workflow: ${{ fromJson(needs.detect-changes.outputs.workflows) }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::509399598587:role/analytical-platform-github-actions

      - name: Set Up UV
        id: setup_uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          activate-environment: true
          version: "latest"
          python-version: "3.11"

      - name: Install Requirements
        id: install_requirements
        run: |
          uv pip install --requirements requirements.txt

      - name: Download path-filters File
        id: download_path_filters
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflows-path-filter
          path: .github/path-filter

      - name: Set Workflow Directory
        id: set_workflow_directory
        env:
          WORKFLOW: ${{ matrix.workflow }}
        run: |
          workflowDirectory=$(yq -e ".${WORKFLOW}" .github/path-filter/workflows.yml | sed 's/.\{3\}$//')
          export workflowDirectory

          echo "workflow-directory=${workflowDirectory}" >>"${GITHUB_ENV}"

      - name: Automatic Approval Check
        id: automatic_approval_check
        env:
          GH_TOKEN: ${{ secrets.DATA_PLATFORM_ROBOT_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          WORKFLOW_DIRECTORY: ${{ env.workflow-directory }}
        run: |
          git fetch origin main

          changed_files="$(git diff --name-only origin/main)"
          changed_files_status="$(git diff --name-status origin/main | awk '{ print $1 }')"

          echo "${changed_files}"
          echo "${changed_files_status}"

          # Default to true
          eligible="true"

          # Check if any files were added or deleted
          for status in ${changed_files_status}; do
            if [[ "${status}" != "M" ]]; then
              echo "File status ${status} detected, not eligible for automatic approval"
              exit 0
            fi
          done

          # Check if the workflow file has been modified, and in what way
          if [[ "$(git diff --name-status origin/main "${WORKFLOW_DIRECTORY}/workflow.yml" | awk '{ print $1 }')" == "M" ]]; then
            echo "Workflow file ${WORKFLOW_DIRECTORY}/workflow.yml has been modified, eligible for automatic approval depending on changes"
            gh api "repos/${GITHUB_REPOSITORY}/contents/${WORKFLOW_DIRECTORY}/workflow.yml?ref=main" --jq '.content' | base64 --decode > "${WORKFLOW_DIRECTORY}/workflow-main.yml"

            if [[ $(python scripts/yaml_diff/main.py "${WORKFLOW_DIRECTORY}/workflow-main.yml" "${WORKFLOW_DIRECTORY}/workflow.yml") == "Only dag.tag has changed" ]]; then
              echo "Only dag.tag has changed, eligible for automatic approval"
            else
              echo "Workflow file ${WORKFLOW_DIRECTORY}/workflow.yml has been modified, not eligible for automatic approval"
              exit 0
            fi
          fi

          # Check if any environments/**/dag.py files have changed
          for file in ${changed_files}; do
            if [[ "${file}" =~ ^environments/.*/dag\.py$ ]]; then
              echo "File (${file}) is a dag.py file, not eligible for automatic approval"
              exit 0
            fi
          done

          # Check if any files outside environments/(development|test|production) have changed
          for file in ${changed_files}; do
            if [[ ! "${file}" =~ ^environments/(development|test|production)/.*$ ]]; then
              echo "File (${file}) has changed outside the specified path (environments/(development|test|production)), not eligible for automatic approval"
              exit 0
            fi
          done

          # Check if pull request author is maintainer of the workflow
          if [[ "$(yq --output-format=json "${WORKFLOW_DIRECTORY}/workflow.yml" | jq --arg GITHUB_ACTOR "${GITHUB_ACTOR}" '.maintainers | any(. == $GITHUB_ACTOR)')" == "true" ]]; then
            echo "${GITHUB_ACTOR} is a maintainer, eligible for automatic approval"
          else
            echo "${GITHUB_ACTOR} is not a maintainer, not eligible for automatic approval"
            exit 0
          fi

          # Check automatic approval status in DynamoDB
          automatic_approval_dynamodb_status="$(aws dynamodb get-item --table-name analytical-platform-airflow-auto-approval --key '{"approval_status": {"S": "status"}}' --query 'Item.value.S' --output text)"

          echo "Automatic approval DynamoDB status: ${automatic_approval_dynamodb_status}"

          if [[ "${automatic_approval_dynamodb_status}" == "active" ]]; then
            echo "Automatic approval is active"
          elif [[ "${automatic_approval_dynamodb_status}" == "paused" ]]; then
            echo "Automatic approval is paused"
            echo "automatic_approval_paused=true" >>"${GITHUB_OUTPUT}"
            eligible="false"
          fi

          echo "eligible=${eligible}" >>"${GITHUB_OUTPUT}"

      - name: Comment on Automatic Approval Check Status
        id: comment_on_automatic_approval_check
        if: steps.automatic_approval_check.outputs.automatic_approval_paused == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Automatic approval is currently paused. Please request manual approval via [#ask-analytical-platform](https://moj.enterprise.slack.com/archives/C4PF7QAJZ).'
            })

      - name: Automatic Approval
        if: steps.automatic_approval_check.outputs.eligible == 'true'
        id: automatic_approval
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.DATA_PLATFORM_ROBOT_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: 'Automatic approval requirements satisfied.',
              event: 'APPROVE'
            })
